# Architecture Template — Schema 2, written by Phase 2
# NCP-Skeleton wird parallel via ncp-author erstellt.
#
# Layout aligned to the 8-step Dramatica Storyform Worksheet
# (`dramatica-theory/references/00-storyform-worksheet.md`).
# Task 072 added: `name` fields on throughlines (Step 1), `story_points`
# block (Step 5), `crucial_element` block (Step 6), `signposts` + `journeys`
# blocks (Step 7), `genre_mode` (Step 8), `ending_type` (auto-derived
# Outcome×Judgment), and `worksheet_audit` step-completion tracker.

schema_version: "1.0"

provenance:
  generated_by: novel-architect@1.0.0
  generated_at: <ISO-8601>
  project_slug: <slug>
  intent_file: intent.yaml

architecture:
  storyform_count: <single|dual>

  # Bei storyform_count: dual wird narratives[1] befüllt.
  # Worksheet-Loop läuft Throughline-für-Throughline durch BEIDE narratives
  # simultan (SKILL.md "Dual-Storyform-Integrität" + Phase 2 HR.P2.6).
  narratives:
    - id: storyform_a

      # ── Step 1: Identify the Four Throughlines (name + perspective) ──
      throughlines:
        os: { name: <PLACEHOLDER>, class: <Universe|Physics|Mind|Psychology>, type: <PLACEHOLDER>, variation: <PLACEHOLDER>, element: <PLACEHOLDER> }
        mc: { name: <PLACEHOLDER>, class: <PLACEHOLDER>,                     type: <PLACEHOLDER>, variation: <PLACEHOLDER>, element: <PLACEHOLDER> }
        ic: { name: <PLACEHOLDER>, class: <PLACEHOLDER>,                     type: <PLACEHOLDER>, variation: <PLACEHOLDER>, element: <PLACEHOLDER> }
        ss: { name: <PLACEHOLDER>, class: <PLACEHOLDER>,                     type: <PLACEHOLDER>, variation: <PLACEHOLDER>, element: <PLACEHOLDER> }

      # ── Steps 3 + 4: Dynamics (8 binaries) ──
      dynamics:
        mc_resolve:    <Change|Steadfast>
        mc_growth:     <Start|Stop>
        mc_approach:   <Doer|Beer>
        mc_mental_sex: <Linear|Holistic>
        plot_driver:   <Action|Decision>
        plot_limit:    <Timelock|Optionlock>
        outcome:       <Success|Failure>
        judgment:      <Good|Bad>

      # Auto-derived from outcome × judgment (Phase 2.6 readout).
      # Triumph (Success+Good) / Personal Triumph (Failure+Good) /
      # Personal Tragedy (Success+Bad) / Tragedy (Failure+Bad).
      ending_type: <PLACEHOLDER>

      # ── Step 5: Plot Story Points ──
      story_points:
        static:
          goal:         <PLACEHOLDER>   # MUST be Type-level (quick-ref §9)
          requirements: <PLACEHOLDER>
          consequences: <PLACEHOLDER>
          forewarnings: <PLACEHOLDER>
        driver:
          dividends:     <PLACEHOLDER>
          costs:         <PLACEHOLDER>
          prerequisites: <PLACEHOLDER>
          preconditions: <PLACEHOLDER>
        thematic:
          # Per throughline: concern (Type) / issue (Variation) / problem (Element)
          # / solution / focus / direction.
          os: { concern: <PLACEHOLDER>, issue: <PLACEHOLDER>, problem: <PLACEHOLDER>, solution: <PLACEHOLDER>, focus: <PLACEHOLDER>, direction: <PLACEHOLDER> }
          mc: { concern: <PLACEHOLDER>, issue: <PLACEHOLDER>, problem: <PLACEHOLDER>, solution: <PLACEHOLDER>, focus: <PLACEHOLDER>, direction: <PLACEHOLDER> }
          ic: { concern: <PLACEHOLDER>, issue: <PLACEHOLDER>, problem: <PLACEHOLDER>, solution: <PLACEHOLDER>, focus: <PLACEHOLDER>, direction: <PLACEHOLDER> }
          ss: { concern: <PLACEHOLDER>, issue: <PLACEHOLDER>, problem: <PLACEHOLDER>, solution: <PLACEHOLDER>, focus: <PLACEHOLDER>, direction: <PLACEHOLDER> }

      # ── Step 6: Crucial Element ──
      crucial_element:
        element:              <ontology-id>   # one of the 64 OS Character Elements
        dynamic_pair_partner: <ontology-id>   # the IC's element
        role:                 <problem|solution>  # must match mc_resolve

      # ── Step 7: Signposts (4 per throughline) + Journeys (3 per throughline) ──
      # Order constrained by Class's Type-Quad — look up via
      # `tools/dramatica-nav/nav.py by-quad quad.<class>-tp`.
      signposts:
        os: [<sp1>, <sp2>, <sp3>, <sp4>]
        mc: [<sp1>, <sp2>, <sp3>, <sp4>]
        ic: [<sp1>, <sp2>, <sp3>, <sp4>]
        ss: [<sp1>, <sp2>, <sp3>, <sp4>]
      journeys:
        os: [<j1_2>, <j2_3>, <j3_4>]   # 3 transitions between 4 signposts
        mc: [<j1_2>, <j2_3>, <j3_4>]
        ic: [<j1_2>, <j2_3>, <j3_4>]
        ss: [<j1_2>, <j2_3>, <j3_4>]

      # ── Step 8 (optional): Genre Mode ──
      genre_mode: null   # one of dramatica's Mode-of-Expression ontology-ids, or null

ncp:
  skeleton_written: false                  # true wenn ncp-author skeleton erstellt
  ncp_file: canon/<slug>.ncp.json
  validation_status: pending               # pending | passed | failed

gates:
  gate_1_storyform_shape:               { approved: false, edits: 0 }
  gate_2_classes_dynamics_storypoints:  { approved: false, edits: 0 }
  gate_3_final_architecture:            { approved: false, edits: 0 }

# Worksheet-Step completion audit.
#
# **Semantics (Task 072 deferred-machinery convention):** these flags are
# the *human-readable audit trail* of which worksheet steps have committed
# their slots. The orchestrator's Phase 2 loop SHOULD flip each flag to
# `true` after the corresponding step's askuser approves and the slots are
# written to this YAML — but there is no enforcing linter yet (see Task
# 072 friction-log §"What rubbed"; a follow-up Task may wire
# `tools/fm/validate.py --check-body` to refuse Gate 3 approval when
# required flags are missing).
#
# Until that linter ships, the flags are *descriptive*, not mechanical —
# read them as a closure checklist for human reviewers. `render_architecture.py`
# surfaces all 10 flags in the Phase 2 status-view so reviewers see the
# audit shape immediately.
#
# Required to be `true` before Gate 3 approval: step_{0..7}, validation_pass.
# `step_8_genre_mode_set` is optional (Step 8 is itself optional).
worksheet_audit:
  step_0_intent_loaded:           false   # set true at Phase 2.2 (precondition)
  step_1_throughlines_named:      false
  step_2_classes_assigned:        false
  step_3_character_dynamics_set:  false
  step_4_plot_dynamics_set:       false
  step_5_story_points_set:        false
  step_6_crucial_element_set:     false
  step_7_signposts_set:           false
  step_8_genre_mode_set:          false   # may stay false (optional)
  validation_pass:                false

approved: false

revisions: []
